name: CI

on:
  pull_request:
    paths:
      - 'src/**/*'
      - 'public/**/*'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'next.config.ts'
      - 'next-env.d.ts'
      - 'eslint.config.mjs'
      - 'vitest.config.ts'
      - 'vitest.setup.ts'

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run check-types
      - run: npm run test-coverage
      - name: Report coverage
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
